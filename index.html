            padding: 0;
            box-sizing: border-box;
        }

        }

            text-align: center;
            color: white;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 2.5rem;
            background: linear-gradient(135deg, #ff9a9e, #fad0c4, #fad0c4);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .header p {
            opacity: 0.8;
            margin-top: 8px;
        }

        .ai-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(380px, 1fr));
            gap: 25px;
            margin-bottom: 30px;
        }

        .ai-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            border-radius: 28px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.2);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .ai-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
        }

        .ai-header {
            padding: 20px;
            text-align: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .ai-emoji {
            font-size: 3rem;
            display: block;
        }

        .ai-name {
            font-size: 1.4rem;
            font-weight: bold;
            margin-top: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            flex-wrap: wrap;
        }

        .ai-desc {
            font-size: 0.75rem;
            opacity: 0.7;
            margin-top: 4px;
        }

        .status-indicator {
            display: inline-block;
            width: 10px;
            height: 10px;
            border-radius: 50%;
        }

        .status-ready { background: #4CAF50; box-shadow: 0 0 5px #4CAF50; }
        .status-loading { background: #FF9800; animation: pulse 1s infinite; }
        .status-error { background: #f44336; }

        .key-badge {
            font-size: 0.6rem;
            background: rgba(0,0,0,0.5);
            padding: 2px 8px;
            border-radius: 20px;
            margin-left: 8px;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        .ai-chat-area {
            height: 320px;
            overflow-y: auto;
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            background: rgba(0, 0, 0, 0.2);
        }

        .message {
            display: flex;
            gap: 8px;
            animation: fadeIn 0.3s ease;
        }

        .message.user {
            justify-content: flex-end;
        }

        .message.bot {
            justify-content: flex-start;
        }

        .message-content {
            max-width: 85%;
            padding: 8px 12px;
            border-radius: 16px;
            font-size: 0.85rem;
            line-height: 1.4;
        }

        .message.user .message-content {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border-bottom-right-radius: 4px;
        }

        .message.bot .message-content {
            background: rgba(255, 255, 255, 0.15);
            color: white;
            border-bottom-left-radius: 4px;
        }

        .message-avatar {
            font-size: 1.1rem;
        }

        .ai-input-area {
            display: flex;
            padding: 12px;
            gap: 8px;
            background: rgba(0, 0, 0, 0.3);
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        .ai-input-area input {
            flex: 1;
            padding: 10px 14px;
            border: none;
            border-radius: 28px;
            background: rgba(255, 255, 255, 0.1);
            color: white;
            outline: none;
            font-size: 0.85rem;
        }

        .ai-input-area input::placeholder {
            color: rgba(255, 255, 255, 0.5);
        }

        .ai-input-area button {
            padding: 10px 18px;
            border: none;
            border-radius: 28px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }

        .ai-input-area button:hover:not(:disabled) {
            transform: scale(1.02);
            opacity: 0.9;
        }

        .ai-input-area button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .typing-indicator {
            display: flex;
            gap: 4px;
            padding: 8px 12px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            width: fit-content;
        }

        .typing-indicator span {
            width: 6px;
            height: 6px;
            background: white;
            border-radius: 50%;
            animation: blink 1.4s infinite;
        }

        .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
        .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }

        @keyframes blink {
            0%, 60%, 100% { opacity: 0.3; }
            30% { opacity: 1; }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .fallback-notice {
            font-size: 0.6rem;
            text-align: center;
            padding: 4px;
            color: #ffaa66;
            background: rgba(0,0,0,0.3);
            border-radius: 10px;
            margin: 5px;
        }

        footer {
            text-align: center;
            padding: 20px;
            color: rgba(255, 255, 255, 0.4);
            font-size: 0.7rem;
        }

        @media (max-width: 800px) {
            .ai-grid {
                grid-template-columns: 1fr;
            }
            .ai-name {
                font-size: 1.2rem;
            }
        }
    </style>
</head>

    // Gemini API URL
    const GEMINI_API_URL = "https://generativelanguage.googleapis.com/v1beta/openai/chat/completions";

    // Store AI instances
    let aiInstances = [];

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        }).replace(/\n/g, '<br>');
    }

    // AI Class with multiple API keys & fallback
    class AIInstance {
        constructor(personality, allApiKeys) {
            this.id = personality.id;
            this.name = personality.name;
            this.emoji = personality.emoji;
            this.desc = personality.desc;
            this.prompt = personality.prompt;
            this.allApiKeys = [...allApiKeys]; // all keys
            self.currentKeyIndex = 0;
            this.messages = [];
            this.status = 'ready';
            this.element = null;
            this.chatContainer = null;
            this.inputField = null;
            this.sendButton = null;
            this.fallbackCount = 0;
        }

        getCurrentApiKey() {
            return this.allApiKeys[this.currentKeyIndex % this.allApiKeys.length];
        }

        async tryNextApiKey() {
            this.currentKeyIndex++;
            this.fallbackCount++;
            const newKey = this.getCurrentApiKey();
            console.log(`🔄 ${this.name} switching to API key #${this.currentKeyIndex + 1}`);
            this.addSystemMessage(`⚠️ Switching to backup API key... (Attempt ${this.fallbackCount})`);
            return newKey;
        }

        async sendMessageWithFallback(userMessage, retryCount = 0) {
            if (retryCount >= this.allApiKeys.length) {
                this.addBotMessage("❌ सभी API keys fail हो गईं! कृपया बाद में try करें। 😢");
                this.setStatus('error');
                return;
            }

            const currentKey = this.getCurrentApiKey();
            
            try {
                const apiMessages = [
                    { role: "system", content: this.prompt },
                    ...this.messages.slice(-15),
                    { role: "user", content: userMessage }
                ];

                const response = await fetch(GEMINI_API_URL, {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                        "Authorization": `Bearer ${currentKey}`
                    },
                    body: JSON.stringify({
                        model: "gemini-1.5-flash",
                        messages: apiMessages,
                        temperature: 0.9,
                        max_tokens: 250
                    })
                });

                if (!response.ok) {
                    const errorData = await response.json();
                    console.warn(`❌ ${this.name} API failed with key:`, errorData);
                    await this.tryNextApiKey();
                    return this.sendMessageWithFallback(userMessage, retryCount + 1);
                }

                const data = await response.json();
                const aiReply = data.choices[0]?.message?.content || "मुझे समझ नहीं आया, कृपया फिर से पूछो 💬";
                
                this.messages.push({ role: "user", content: userMessage });
                this.messages.push({ role: "assistant", content: aiReply });
                
                if (this.messages.length > 30) {
                    this.messages = this.messages.slice(-30);
                }
                
                return aiReply;
                
            } catch (error) {
                console.error(`🌐 Network error for ${this.name}:`, error);
                await this.tryNextApiKey();
                return this.sendMessageWithFallback(userMessage, retryCount + 1);
            }
        }

        async sendMessage(userMessage) {
            if (!userMessage.trim()) return;
            
            this.addUserMessage(userMessage);
            this.setStatus('loading');
            this.showTypingIndicator();
            
            const reply = await this.sendMessageWithFallback(userMessage, 0);
            
            this.removeTypingIndicator();
            this.addBotMessage(reply);
            this.setStatus('ready');
        }
        
        addUserMessage(text) {
            if (!this.chatContainer) return;
            const msgDiv = document.createElement('div');
            msgDiv.className = 'message user';
            msgDiv.innerHTML = `
                <div class="message-content">${escapeHtml(text)}</div>
                <div class="message-avatar">👤</div>
            `;
            this.chatContainer.appendChild(msgDiv);
            this.scrollToBottom();
        }
        
        addBotMessage(text) {
            if (!this.chatContainer) return;
            const msgDiv = document.createElement('div');
            msgDiv.className = 'message bot';
            msgDiv.innerHTML = `
                <div class="message-avatar">${this.emoji}</div>
                <div class="message-content">${escapeHtml(text)}</div>
            `;
            this.chatContainer.appendChild(msgDiv);
            this.scrollToBottom();
        }

        addSystemMessage(text) {
            if (!this.chatContainer) return;
            const msgDiv = document.createElement('div');
            msgDiv.className = 'message bot';
            msgDiv.innerHTML = `
                <div class="message-avatar">⚙️</div>
                <div class="message-content" style="font-size:0.7rem; opacity:0.7;">${escapeHtml(text)}</div>
            `;
            this.chatContainer.appendChild(msgDiv);
            this.scrollToBottom();
        }
        
        showTypingIndicator() {
            if (!this.chatContainer) return;
            const typingDiv = document.createElement('div');
            typingDiv.className = 'message bot';
            typingDiv.id = `typing-${this.id}`;
            typingDiv.innerHTML = `
                <div class="message-avatar">${this.emoji}</div>
                <div class="typing-indicator">
                    <span></span><span></span><span></span>
                </div>
            `;
            this.chatContainer.appendChild(typingDiv);
            this.scrollToBottom();
        }
        
        removeTypingIndicator() {
            const typingDiv = document.getElementById(`typing-${this.id}`);
            if (typingDiv) typingDiv.remove();
        }
        
        scrollToBottom() {
            if (this.chatContainer) {
                this.chatContainer.scrollTop = this.chatContainer.scrollHeight;
            }
        }
        
        setStatus(status) {
            this.status = status;
            if (this.element) {
                const indicator = this.element.querySelector('.status-indicator');
                if (indicator) {
                    indicator.className = `status-indicator status-${status}`;
                }
            }
            if (this.sendButton) {
                this.sendButton.disabled = (status === 'loading');
            }
            if (this.inputField) {
                this.inputField.disabled = (status === 'loading');
            }
        }

            card.innerHTML = `

                    <span class="ai-emoji">${this.emoji}</span>

                    </div>

                </div>

                if (msg) {
                    this.sendMessage(msg);
                    this.inputField.value = '';
                }
            });

                if (e.key === 'Enter') {

                    if (msg) {

                        this.inputField.value = '';
                    }
                }
            });

                3: "👻 अंधेरा हो रहा है... डरावनी कहानी सुनोगे? 🌙",
                4: "🧸 हाय प्यारे! कैसे हो? मैं तुम्हें बहुत प्यार करता हूँ 💕🐻",
                5: "🎯 नमस्ते! कोई सलाह चाहिए? मैं हूँ न तुम्हारे लिए ✨"
            };
            return welcomes[this.id] || "नमस्ते! मुझसे बात करो 💬";
        }
    }
    
    // Initialize all AIs with ALL API keys
    function initAllAI() {
        const grid = document.getElementById('aiGrid');
        grid.innerHTML = '';
        aiInstances = [];
        
        for (let i = 0; i < AI_PERSONALITIES.length; i++) {
            // Har AI ko ALL API keys milengi
            const ai = new AIInstance(AI_PERSONALITIES[i], VALID_API_KEYS);
            ai.renderCard(grid);
            aiInstances.push(ai);
        }
        
        console.log(`✅ ${aiInstances.length} AI Personalities Created`);
        console.log(`✅ Each AI has ${VALID_API_KEYS.length} backup API keys`);
    }
    
    // Start
    initAllAI();
</script>
</body>
