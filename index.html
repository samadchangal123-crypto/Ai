<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>🎭 Multi-AI Hub | Romantic | Funny | Sad | Horror | Cute | Guru 🎭</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            font-family: 'Segoe UI', 'Poppins', sans-serif;
            min-height: 100vh;
            padding: 20px;
        }

        /* Floating API Key Panel */
        .api-panel {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: rgba(0,0,0,0.9);
            backdrop-filter: blur(10px);
            padding: 15px 20px;
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.2);
            z-index: 1000;
            max-width: 320px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .api-panel h4 {
            color: white;
            font-size: 0.85rem;
            margin-bottom: 8px;
        }

        .api-panel input {
            width: 100%;
            padding: 10px 12px;
            border: none;
            border-radius: 25px;
            background: rgba(255,255,255,0.15);
            color: white;
            font-size: 0.75rem;
            outline: none;
        }

        .api-panel input::placeholder {
            color: rgba(255,255,255,0.5);
        }

        .api-panel button {
            width: 100%;
            margin-top: 8px;
            padding: 8px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border: none;
            border-radius: 25px;
            color: white;
            cursor: pointer;
            font-size: 0.75rem;
        }

        .api-status {
            font-size: 0.65rem;
            margin-top: 6px;
            text-align: center;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 2.5rem;
            background: linear-gradient(135deg, #ff9a9e, #fad0c4, #fad0c4);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .ai-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(360px, 1fr));
            gap: 25px;
            margin-bottom: 30px;
        }

        .ai-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            border-radius: 28px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.2);
            transition: transform 0.3s ease;
        }

        .ai-card:hover {
            transform: translateY(-5px);
        }

        .ai-header {
            padding: 18px;
            text-align: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .ai-emoji {
            font-size: 2.8rem;
        }

        .ai-name {
            font-size: 1.3rem;
            font-weight: bold;
            margin-top: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            display: inline-block;
        }

        .status-ready { background: #4CAF50; box-shadow: 0 0 5px #4CAF50; }
        .status-loading { background: #FF9800; animation: pulse 1s infinite; }
        .status-error { background: #f44336; }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        .ai-chat-area {
            height: 300px;
            overflow-y: auto;
            padding: 12px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            background: rgba(0, 0, 0, 0.2);
        }

        .message {
            display: flex;
            gap: 8px;
            animation: fadeIn 0.2s ease;
        }

        .message.user { justify-content: flex-end; }
        .message.bot { justify-content: flex-start; }

        .message-content {
            max-width: 85%;
            padding: 8px 12px;
            border-radius: 16px;
            font-size: 0.85rem;
            line-height: 1.4;
        }

        .message.user .message-content {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border-bottom-right-radius: 4px;
        }

        .message.bot .message-content {
            background: rgba(255, 255, 255, 0.15);
            color: white;
            border-bottom-left-radius: 4px;
        }

        .typing-indicator {
            display: flex;
            gap: 4px;
            padding: 8px 12px;
            background: rgba(255,255,255,0.1);
            border-radius: 16px;
            width: fit-content;
        }

        .typing-indicator span {
            width: 6px;
            height: 6px;
            background: white;
            border-radius: 50%;
            animation: blink 1.4s infinite;
        }

        .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
        .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }

        @keyframes blink {
            0%, 60%, 100% { opacity: 0.3; }
            30% { opacity: 1; }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .ai-input-area {
            display: flex;
            padding: 12px;
            gap: 8px;
            background: rgba(0, 0, 0, 0.3);
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        .ai-input-area input {
            flex: 1;
            padding: 10px 14px;
            border: none;
            border-radius: 28px;
            background: rgba(255, 255, 255, 0.1);
            color: white;
            outline: none;
            font-size: 0.85rem;
        }

        .ai-input-area input::placeholder {
            color: rgba(255, 255, 255, 0.5);
        }

        .ai-input-area button {
            padding: 10px 18px;
            border: none;
            border-radius: 28px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            cursor: pointer;
            font-weight: bold;
        }

        .ai-input-area button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        footer {
            text-align: center;
            padding: 20px;
            color: rgba(255, 255, 255, 0.4);
            font-size: 0.7rem;
        }

        @media (max-width: 800px) {
            .ai-grid {
                grid-template-columns: 1fr;
            }
            .api-panel {
                position: relative;
                bottom: auto;
                right: auto;
                margin-bottom: 20px;
                max-width: 100%;
            }
        }
    </style>
</head>
<body>

<div class="header">
    <h1>🎭 Multi-AI Personality Hub 🎭</h1>
    <p>✨ 6 अलग-अलग AI | एक साथ बात करो | अपनी Gemini API Key डालो ✨</p>
</div>

<!-- API Key Panel -->
<div class="api-panel">
    <h4>🔑 Gemini API Key</h4>
    <input type="password" id="globalApiKey" placeholder="Paste your Gemini API Key here">
    <button id="setGlobalKeyBtn">✅ Set API Key for All AIs</button>
    <div id="apiStatusMsg" class="api-status">⚡ Need API Key to chat</div>
</div>

<div class="ai-grid" id="aiGrid"></div>

<footer>
    💡 Free Gemini API Key: <a href="https://aistudio.google.com/apikey" target="_blank" style="color:#ff9a9e;">Get from Google AI Studio</a>
</footer>

<script>
    // ============================================
    // AI PERSONALITIES (6 Different)
    // ============================================
    const AI_PERSONALITIES = [
        {
            id: 0,
            name: "💕 ROMANTIC AI",
            emoji: "🥰",
            desc: "प्यार, रोमांस, शायरी",
            systemPrompt: `You are a ROMANTIC AI. Your job is to speak love-filled words, write romantic shayari, and share heart-to-heart conversations. Every response must have love and sweetness. Use emojis. Respond in Hindi or Hinglish. Keep responses short (2-3 lines) but heart-touching. ❤️💕🥰`
        },
        {
            id: 1,
            name: "😂 FUNNY AI",
            emoji: "🤣",
            desc: "मजाक, चुटकुले, हंसी",
            systemPrompt: `You are a FUNNY and MAZAKIYA AI. Your job is to make people laugh, tell jokes, and give funny replies. Every response must have humor. A little sarcasm is fine. Keep responses short (1-2 lines). Respond in Hindi or Hinglish. 😂🤣😜`
        },
        {
            id: 2,
            name: "😢 SAD SHAYARI AI",
            emoji: "💔",
            desc: "दर्द भरी शायरी, उदासी",
            systemPrompt: `You are a SAD and DARD BHARA AI. Your job is to recite painful poetry, talk about heartbreak, and share sad feelings. Every response should have deep pain and poetry. Keep responses short (2-3 lines) but heart-breaking. Respond in Hindi. 💔😢🌙`
        },
        {
            id: 3,
            name: "👻 HORROR AI",
            emoji: "👻",
            desc: "डरावनी कहानियाँ",
            systemPrompt: `You are a HORROR and DARAWNI AI. Your job is to tell scary stories, talk about ghosts, and create a creepy atmosphere. Keep responses short (2-3 lines) but give a creepy feel. Respond in Hindi or Hinglish. 👻🕷️🌙`
        },
        {
            id: 4,
            name: "🐻 CUTE AI",
            emoji: "🧸",
            desc: "प्यारी, मीठी बातें",
            systemPrompt: `You are a CUTE and PYAARI AI. Your job is to speak sweet, cute, and lovely words. Use lots of emojis 🥺💕🧸🐻. Talk like a cute child. Keep responses short (1-2 lines). Respond in Hindi or Hinglish. 🧸💖`
        },
        {
            id: 5,
            name: "🎯 GURU AI",
            emoji: "📿",
            desc: "सलाह, मोटिवेशन",
            systemPrompt: `You are a WISE and SALAH dene wala AI. Your job is to give solutions, motivation, and good advice. Every response must have positivity and wisdom. Keep responses short (2-3 lines). Respond in Hindi or Hinglish. 🎯✨`
        }
    ];

    // Gemini API
    const GEMINI_API_URL = "https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent";

    let globalApiKey = localStorage.getItem("gemini_api_key") || "";
    let aiInstances = [];

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        }).replace(/\n/g, '<br>');
    }

    // AI Class
    class AIInstance {
        constructor(personality) {
            this.id = personality.id;
            this.name = personality.name;
            this.emoji = personality.emoji;
            this.desc = personality.desc;
            this.systemPrompt = personality.systemPrompt;
            this.messages = [];
            this.status = 'ready';
            this.element = null;
            this.chatContainer = null;
            this.inputField = null;
            this.sendButton = null;
        }

        async sendMessage(userMessage) {
            if (!globalApiKey) {
                this.addBotMessage("⚠️ पहले ऊपर अपनी Gemini API Key डालो और 'Set API Key' दबाओ! 🔑");
                return;
            }
            if (!userMessage.trim()) return;

            this.addUserMessage(userMessage);
            this.setStatus('loading');
            this.showTypingIndicator();

            try {
                const fullPrompt = `${this.systemPrompt}\n\nUser: ${userMessage}\n\nAssistant (${this.name}):`;
                
                const response = await fetch(`${GEMINI_API_URL}?key=${globalApiKey}`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        contents: [{
                            parts: [{ text: fullPrompt }]
                        }],
                        generationConfig: {
                            temperature: 0.9,
                            maxOutputTokens: 200,
                            topP: 0.95
                        }
                    })
                });

                this.removeTypingIndicator();

                if (!response.ok) {
                    const error = await response.json();
                    console.error("API Error:", error);
                    if (response.status === 401 || response.status === 403) {
                        this.addBotMessage("❌ Invalid API Key! Please check your Gemini API Key.");
                        this.setStatus('error');
                    } else {
                        this.addBotMessage("❌ API Error: " + (error.error?.message || "Something went wrong"));
                        this.setStatus('error');
                    }
                    return;
                }

                const data = await response.json();
                const aiReply = data.candidates?.[0]?.content?.parts?.[0]?.text || "Mujhe samajh nahi aaya. Phir se poocho 💬";
                
                // Clean reply
                let cleanReply = aiReply.replace(new RegExp(`Assistant \\(${this.name}\\):`, 'gi'), '').trim();
                if (!cleanReply) cleanReply = aiReply;
                
                this.messages.push({ role: "user", content: userMessage });
                this.messages.push({ role: "assistant", content: cleanReply });
                
                if (this.messages.length > 20) {
                    this.messages = this.messages.slice(-20);
                }
                
                this.addBotMessage(cleanReply);
                this.setStatus('ready');
                
            } catch (error) {
                this.removeTypingIndicator();
                console.error("Network Error:", error);
                this.addBotMessage("❌ Network error! Check your internet connection.");
                this.setStatus('error');
            }
        }

        addUserMessage(text) {
            if (!this.chatContainer) return;
            const msgDiv = document.createElement('div');
            msgDiv.className = 'message user';
            msgDiv.innerHTML = `<div class="message-content">${escapeHtml(text)}</div><div class="message-avatar">👤</div>`;
            this.chatContainer.appendChild(msgDiv);
            this.scrollToBottom();
        }

        addBotMessage(text) {
            if (!this.chatContainer) return;
            const msgDiv = document.createElement('div');
            msgDiv.className = 'message bot';
            msgDiv.innerHTML = `<div class="message-avatar">${this.emoji}</div><div class="message-content">${escapeHtml(text)}</div>`;
            this.chatContainer.appendChild(msgDiv);
            this.scrollToBottom();
        }

        showTypingIndicator() {
            if (!this.chatContainer) return;
            const typingDiv = document.createElement('div');
            typingDiv.className = 'message bot';
            typingDiv.id = `typing-${this.id}`;
            typingDiv.innerHTML = `<div class="message-avatar">${this.emoji}</div><div class="typing-indicator"><span></span><span></span><span></span></div>`;
            this.chatContainer.appendChild(typingDiv);
            this.scrollToBottom();
        }

        removeTypingIndicator() {
            const el = document.getElementById(`typing-${this.id}`);
            if (el) el.remove();
        }

        scrollToBottom() {
            if (this.chatContainer) {
                this.chatContainer.scrollTop = this.chatContainer.scrollHeight;
            }
        }

        setStatus(status) {
            this.status = status;
            if (this.element) {
                const dot = this.element.querySelector('.status-dot');
                if (dot) {
                    dot.className = `status-dot status-${status}`;
                }
            }
            if (this.sendButton) {
                this.sendButton.disabled = (status === 'loading');
            }
            if (this.inputField) {
                this.inputField.disabled = (status === 'loading');
            }
        }

        renderCard(container) {
            const card = document.createElement('div');
            card.className = 'ai-card';
            card.innerHTML = `
                <div class="ai-header">
                    <span class="ai-emoji">${this.emoji}</span>
                    <div class="ai-name">
                        ${this.name}
                        <span class="status-dot status-${this.status}"></span>
                    </div>
                    <div class="ai-desc">${this.desc}</div>
                </div>
                <div class="ai-chat-area" id="chat-${this.id}"></div>
                <div class="ai-input-area">
                    <input type="text" id="input-${this.id}" placeholder="✏️ यहाँ लिखो..." autocomplete="off">
                    <button id="send-${this.id}">➤ भेजें</button>
                </div>
            `;
            container.appendChild(card);

            this.element = card;
            this.chatContainer = document.getElementById(`chat-${this.id}`);
            this.inputField = document.getElementById(`input-${this.id}`);
            this.sendButton = document.getElementById(`send-${this.id}`);

            // Welcome message
            this.addBotMessage(this.getWelcomeMessage());

            // Events
            this.sendButton.addEventListener('click', () => {
                const msg = this.inputField.value.trim();
                if (msg) {
                    this.sendMessage(msg);
                    this.inputField.value = '';
                }
            });

            this.inputField.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') {
                    const msg = this.inputField.value.trim();
                    if (msg) {
                        this.sendMessage(msg);
                        this.inputField.value = '';
                    }
                }
            });
        }

        getWelcomeMessage() {
            const welcomes = {
                0: "💕 हाय! मैं Romantic AI हूँ। अपनी love story share करो ❤️",
                1: "😂 हाय! मैं Funny AI हूँ। कोई मजाक सुनाऊँ? 🤣",
                2: "💔 उदास हो? मेरे साथ शायरी share करो 😢",
                3: "👻 डर लगता है? मैं Horror AI हूँ 👻",
                4: "🧸 हाय प्यारे! कैसे हो? 🐻💕",
                5: "🎯 नमस्ते! कोई सलाह चाहिए? मैं हूँ ✨"
            };
            return welcomes[this.id] || "नमस्ते! मुझसे बात करो 💬";
        }
    }

    // Initialize
    function initAllAI() {
        const grid = document.getElementById('aiGrid');
        grid.innerHTML = '';
        aiInstances = [];
        
        for (let i = 0; i < AI_PERSONALITIES.length; i++) {
            const ai = new AIInstance(AI_PERSONALITIES[i]);
            ai.renderCard(grid);
            aiInstances.push(ai);
        }
        
        updateAPIStatus();
    }

    function updateAPIStatus() {
        const msgDiv = document.getElementById('apiStatusMsg');
        if (globalApiKey) {
            msgDiv.innerHTML = "✅ API Key is SET! All AIs are ready to chat.";
            msgDiv.style.color = "#a5d6a5";
        } else {
            msgDiv.innerHTML = "⚠️ Please enter your Gemini API Key above to start chatting";
            msgDiv.style.color = "#ffaa66";
        }
    }

    // API Key Management
    const keyInput = document.getElementById('globalApiKey');
    const setKeyBtn = document.getElementById('setGlobalKeyBtn');

    if (globalApiKey) {
        keyInput.value = "••••••••••••••••";
    }

    setKeyBtn.addEventListener('click', () => {
        let newKey = keyInput.value.trim();
        if (newKey && newKey !== "••••••••••••••••") {
            globalApiKey = newKey;
            localStorage.setItem("gemini_api_key", globalApiKey);
            keyInput.value = "••••••••••••••••";
            updateAPIStatus();
            // Show success in first AI
            if (aiInstances[0]) {
                aiInstances[0].addBotMessage("✅ API Key set successfully! Ab mujhse kuch bhi pooch sakte ho 💬");
            }
        } else if (!newKey) {
            alert("Please enter a valid Gemini API Key!\n\nGet it from: https://aistudio.google.com/apikey");
        } else {
            alert("API Key already set! To change, clear browser storage or enter new key.");
        }
    });

    // Start
    initAllAI();
</script>
</body>
</html>
